name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: inxi-go-linux-amd64
          - goos: linux
            goarch: arm64
            asset: inxi-go-linux-arm64
          - goos: darwin
            goarch: amd64
            asset: inxi-go-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: inxi-go-darwin-arm64
          - goos: windows
            goarch: amd64
            asset: inxi-go-windows-amd64.exe
          - goos: windows
            goarch: arm64
            asset: inxi-go-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.asset }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
